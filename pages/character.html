<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Elysium: Persistent World - إنشاء الشخصية" />
    <title>Elysium · ولادة الشخصية</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
        /* ============================================================
           CSS CUSTOM — Character Creation System
           ============================================================ */
        :root {
            --gold: #f0b300;
            --gold-light: #ffd866;
            --gold-dark: #b8860b;
            --bg-primary: #06060b;
            --bg-secondary: #0c0c18;
            --bg-card: rgba(18, 18, 42, 0.75);
            --text-primary: #f5f5fa;
            --text-secondary: #a8a8c8;
            --text-muted: #6b6b8a;
            --radius: 24px;
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        /* ---------- Animated Background ---------- */
        .char-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 60% 40% at 80% 20%, rgba(240, 179, 0, 0.04), transparent 50%),
                radial-gradient(ellipse 50% 50% at 20% 80%, rgba(120, 80, 200, 0.03), transparent 50%),
                var(--bg-primary);
        }

        .char-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.06;
            pointer-events: none;
            animation: float-orb 30s infinite alternate ease-in-out;
        }

        .char-orb--1 {
            width: 700px;
            height: 700px;
            background: var(--gold);
            top: -30%;
            right: -20%;
            animation-delay: 0s;
        }

        .char-orb--2 {
            width: 500px;
            height: 500px;
            background: #7c3aed;
            bottom: -20%;
            left: -10%;
            animation-delay: -10s;
        }

        @keyframes float-orb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-50px, 40px) scale(1.1);
            }
            100% {
                transform: translate(30px, -30px) scale(0.9);
            }
        }

        /* ---------- Particles ---------- */
        #char-particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* ---------- Main Container ---------- */
        .char-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
        }

        .char-card {
            background: var(--bg-card);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), 0 0 60px rgba(240, 179, 0, 0.04);
            padding: 40px 36px;
            transition: var(--transition);
        }

        /* ---------- Header ---------- */
        .char-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .char-header .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
        }

        .char-header .logo i {
            background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .char-header .logo span {
            background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .char-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            transition: var(--transition);
        }

        .step-dot.active {
            background: var(--gold);
            box-shadow: 0 0 20px rgba(240, 179, 0, 0.3);
            width: 28px;
            border-radius: 10px;
        }

        /* ---------- Form ---------- */
        .char-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 540px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 14px;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .form-group .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            transition: var(--transition);
            padding: 0 14px;
        }

        .form-group .input-wrapper:focus-within {
            border-color: rgba(240, 179, 0, 0.25);
            box-shadow: 0 0 0 4px rgba(240, 179, 0, 0.03);
            background: rgba(255, 255, 255, 0.05);
        }

        .form-group .input-wrapper .icon {
            color: var(--text-muted);
            font-size: 0.85rem;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .form-group .input-wrapper input,
        .form-group .input-wrapper select {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            font-weight: 400;
        }

        .form-group .input-wrapper input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
        }

        .form-group .input-wrapper select {
            appearance: none;
            cursor: pointer;
        }

        .form-group .input-wrapper select option {
            background: #1a1a3a;
            color: #fff;
        }

        /* ---------- Avatar Picker ---------- */
        .avatar-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .avatar-option {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .avatar-option:hover {
            transform: scale(1.08);
            border-color: rgba(240, 179, 0, 0.2);
        }

        .avatar-option.selected {
            border-color: var(--gold);
            background: rgba(240, 179, 0, 0.08);
            box-shadow: 0 0 30px rgba(240, 179, 0, 0.08);
        }

        .avatar-option.selected::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            bottom: -4px;
            right: -4px;
            font-size: 0.6rem;
            background: var(--gold);
            color: #0a0a0f;
            border-radius: 50%;
            padding: 2px 4px;
        }

        /* ---------- Buttons ---------- */
        .btn-char {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0a0a0f;
            font-weight: 800;
            font-size: 1rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 40px rgba(240, 179, 0, 0.12);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-char:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 60px rgba(240, 179, 0, 0.2);
        }

        .btn-char:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        /* ---------- Digital ID Card ---------- */
        .id-card {
            display: none;
            margin-top: 28px;
            background: linear-gradient(145deg, rgba(18, 18, 42, 0.9), rgba(6, 6, 11, 0.95));
            border: 1px solid rgba(240, 179, 0, 0.1);
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(240, 179, 0, 0.05);
            animation: fadeUp 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        .id-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(240, 179, 0, 0.02), transparent 70%);
            pointer-events: none;
        }

        .id-card.visible {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .id-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .id-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(240, 179, 0, 0.06);
            border: 2px solid rgba(240, 179, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
            flex-shrink: 0;
        }

        .id-title h3 {
            font-weight: 900;
            font-size: 1.2rem;
            margin: 0;
        }

        .id-title .id-number {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.1em;
            background: rgba(255, 255, 255, 0.03);
            padding: 2px 12px;
            border-radius: 100px;
            display: inline-block;
            margin-top: 4px;
        }

        .id-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 20px;
            position: relative;
            z-index: 2;
        }

        @media (max-width: 480px) {
            .id-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }

        .id-item {
            display: flex;
            flex-direction: column;
        }

        .id-item .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .id-item .value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 2px;
        }

        .id-badge {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .id-badge .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #4ade80;
            font-weight: 600;
        }

        .id-badge .status .pulse {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        /* ---------- Back to Auth ---------- */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: var(--transition);
            margin-bottom: 16px;
        }

        .back-link:hover {
            color: #fff;
        }

        /* ---------- Scrollbar ---------- */
        ::-webkit-scrollbar {
            width: 0;
        }
    </style>
</head>
<body>

    <!-- ============================================================
    BACKGROUND
    ============================================================ -->
    <div class="char-bg">
        <div class="char-orb char-orb--1"></div>
        <div class="char-orb char-orb--2"></div>
    </div>
    <canvas id="char-particles"></canvas>

    <!-- ============================================================
    MAIN CONTAINER
    ============================================================ -->
    <div class="char-container">

        <!-- Back Link -->
        <a href="#" class="back-link" id="backToAuth">
            <i class="fas fa-arrow-right"></i> عد إلى الحساب
        </a>

        <!-- Card -->
        <div class="char-card">

            <!-- Header -->
            <div class="char-header">
                <a href="#" class="logo">
                    <i class="fas fa-crown"></i>
                    <span>Elysium</span>
                </a>
                <p>أنشِ هويتك الرقمية لبدء الحياة في العالم المستمر</p>
                <div class="step-indicator">
                    <span class="step-dot active"></span>
                    <span class="step-dot"></span>
                    <span class="step-dot"></span>
                    <span class="step-dot"></span>
                </div>
            </div>

            <!-- ============================================================
            FORM
            ============================================================ -->
            <form class="char-form" id="characterForm" novalidate>

                <!-- Avatar Picker -->
                <div class="form-group">
                    <label>الصورة الرمزية</label>
                    <div class="avatar-grid" id="avatarGrid">
                        <button type="button" class="avatar-option" data-avatar="🧑‍💼">🧑‍💼</button>
                        <button type="button" class="avatar-option" data-avatar="👨‍💼">👨‍💼</button>
                        <button type="button" class="avatar-option" data-avatar="👩‍💼">👩‍💼</button>
                        <button type="button" class="avatar-option" data-avatar="🧑‍🌾">🧑‍🌾</button>
                        <button type="button" class="avatar-option" data-avatar="👨‍⚕️">👨‍⚕️</button>
                        <button type="button" class="avatar-option" data-avatar="👩‍⚕️">👩‍⚕️</button>
                        <button type="button" class="avatar-option" data-avatar="🧑‍🏫">🧑‍🏫</button>
                        <button type="button" class="avatar-option" data-avatar="👨‍🔧">👨‍🔧</button>
                    </div>
                    <span style="font-size:0.7rem;color:var(--text-muted);margin-top:4px;">اختر رمزاً يعبر عن شخصيتك</span>
                </div>

                <!-- Name Row -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">الاسم الأول</label>
                        <div class="input-wrapper">
                            <span class="icon"><i class="fas fa-user"></i></span>
                            <input type="text" id="firstName" placeholder="أحمد" required />
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="lastName">اسم العائلة</label>
                        <div class="input-wrapper">
                            <span class="icon"><i class="fas fa-user-tag"></i></span>
                            <input type="text" id="lastName" placeholder="الملك" required />
                        </div>
                    </div>
                </div>

                <!-- Gender & DOB -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">الجنس</label>
                        <div class="input-wrapper">
                            <span class="icon"><i class="fas fa-venus-mars"></i></span>
                            <select id="gender" required>
                                <option value="">اختر</option>
                                <option value="ذكر">ذكر</option>
                                <option value="أنثى">أنثى</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="dob">تاريخ الميلاد</label>
                        <div class="input-wrapper">
                            <span class="icon"><i class="fas fa-calendar-day"></i></span>
                            <input type="date" id="dob" required />
                        </div>
                    </div>
                </div>

                <!-- Country & City -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="country">الدولة</label>
                        <div class="input-wrapper">
                            <span class="icon"><i class="fas fa-flag"></i></span>
                            <select id="country" required>
                                <option value="">اختر الدولة</option>
                                <option value="مصر">مصر</option>
                                <option value="السعودية">المملكة العربية السعودية</option>
                                <option value="الإمارات">الإمارات العربية المتحدة</option>
                                <option value="الكويت">الكويت</option>
                                <option value="قطر">قطر</option>
                                <option value="الأردن">الأردن</option>
                                <option value="المغرب">المغرب</option>
                                <option value="تونس">تونس</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="city">المدينة</label>
                        <div class="input-wrapper">
                            <span class="icon"><i class="fas fa-city"></i></span>
                            <select id="city" required>
                                <option value="">اختر المدينة</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Language -->
                <div class="form-group">
                    <label for="charLanguage">اللغة المفضلة</label>
                    <div class="input-wrapper">
                        <span class="icon"><i class="fas fa-globe"></i></span>
                        <select id="charLanguage" required>
                            <option value="ar">العربية</option>
                            <option value="en">English</option>
                            <option value="fr">Français</option>
                        </select>
                    </div>
                </div>

                <!-- Actions -->
                <button type="submit" class="btn-char" id="createBtn">
                    <i class="fas fa-id-card"></i> إنشاء الشخصية
                </button>
            </form>

            <!-- ============================================================
            DIGITAL ID CARD
            ============================================================ -->
            <div class="id-card" id="idCard">
                <div class="id-header">
                    <div class="id-avatar" id="idAvatarDisplay">🧑‍💼</div>
                    <div class="id-title">
                        <h3 id="idFullName">أحمد الملك</h3>
                        <span class="id-number" id="idNumber">#ELY-2026-XXXX</span>
                    </div>
                </div>

                <div class="id-grid">
                    <div class="id-item"><span class="label">الجنس</span><span class="value" id="idGender">ذكر</span></div>
                    <div class="id-item"><span class="label">العمر</span><span class="value" id="idAge">٢٥ سنة</span></div>
                    <div class="id-item"><span class="label">الدولة</span><span class="value" id="idCountry">مصر</span></div>
                    <div class="id-item"><span class="label">المدينة</span><span class="value" id="idCity">القاهرة</span></div>
                    <div class="id-item" style="grid-column: 1 / -1;"><span class="label">اللغة</span><span class="value" id="idLanguage">العربية</span></div>
                </div>

                <div class="id-badge">
                    <div class="status">
                        <span class="pulse"></span> بطاقة هوية نشطة
                    </div>
                    <button class="btn-char btn-secondary" id="enterGameBtn" style="width:auto;padding:10px 32px;margin:0;font-size:0.85rem;">
                        <i class="fas fa-play"></i> بدء الحياة
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- ============================================================
    JAVASCRIPT
    ============================================================ -->
    <script>
        (function characterModule() {
            'use strict';

            // ============================================================
            // DOM Refs
            // ============================================================
            const form = document.getElementById('characterForm');
            const createBtn = document.getElementById('createBtn');
            const idCard = document.getElementById('idCard');

            // Fields
            const avatarOptions = document.querySelectorAll('.avatar-option');
            const firstName = document.getElementById('firstName');
            const lastName = document.getElementById('lastName');
            const gender = document.getElementById('gender');
            const dob = document.getElementById('dob');
            const country = document.getElementById('country');
            const city = document.getElementById('city');
            const charLanguage = document.getElementById('charLanguage');

            // ID Card fields
            const idAvatarDisplay = document.getElementById('idAvatarDisplay');
            const idFullName = document.getElementById('idFullName');
            const idNumber = document.getElementById('idNumber');
            const idGender = document.getElementById('idGender');
            const idAge = document.getElementById('idAge');
            const idCountry = document.getElementById('idCountry');
            const idCity = document.getElementById('idCity');
            const idLanguage = document.getElementById('idLanguage');

            const backLink = document.getElementById('backToAuth');
            const enterGameBtn = document.getElementById('enterGameBtn');

            // ============================================================
            // City data (logical)
            // ============================================================
            const citiesMap = {
                'مصر': ['القاهرة', 'الإسكندرية', 'الجيزة', 'الأقصر'],
                'السعودية': ['الرياض', 'جدة', 'مكة المكرمة', 'المدينة المنورة'],
                'الإمارات': ['دبي', 'أبوظبي', 'الشارقة', 'عجمان'],
                'الكويت': ['مدينة الكويت', 'حولي', 'الأحمدي'],
                'قطر': ['الدوحة', 'الريان', 'الوكرة'],
                'الأردن': ['عمان', 'الزرقاء', 'إربد'],
                'المغرب': ['الدار البيضاء', 'الرباط', 'مراكش'],
                'تونس': ['تونس', 'سوسة', 'صفاقس'],
            };

            // ============================================================
            // Update cities on country change
            // ============================================================
            country.addEventListener('change', function() {
                const selected = this.value;
                city.innerHTML = '<option value="">اختر المدينة</option>';
                if (selected && citiesMap[selected]) {
                    citiesMap[selected].forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c;
                        opt.textContent = c;
                        city.appendChild(opt);
                    });
                }
            });

            // ============================================================
            // Avatar selection
            // ============================================================
            let selectedAvatar = '🧑‍💼';

            avatarOptions.forEach(btn => {
                btn.addEventListener('click', function() {
                    avatarOptions.forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedAvatar = this.dataset.avatar;
                });
            });

            // Select first by default
            if (avatarOptions.length > 0) {
                avatarOptions[0].classList.add('selected');
                selectedAvatar = avatarOptions[0].dataset.avatar;
            }

            // ============================================================
            // Calculate age from DOB
            // ============================================================
            function calculateAge(birthDate) {
                if (!birthDate) return null;
                const today = new Date();
                const birth = new Date(birthDate);
                let age = today.getFullYear() - birth.getFullYear();
                const m = today.getMonth() - birth.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
                    age--;
                }
                return age;
            }

            // ============================================================
            // Generate ID number
            // ============================================================
            function generateId() {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let result = '#ELY-2026-';
                for (let i = 0; i < 4; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }

            // ============================================================
            // Form submission
            // ============================================================
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                // Validate
                const fName = firstName.value.trim();
                const lName = lastName.value.trim();
                const gen = gender.value;
                const birth = dob.value;
                const cnt = country.value;
                const cit = city.value;
                const lang = charLanguage.value;

                if (!fName || !lName || !gen || !birth || !cnt || !cit || !lang) {
                    alert('يرجى ملء جميع الحقول قبل إنشاء الشخصية.');
                    return;
                }

                const age = calculateAge(birth);
                if (age === null || age < 10 || age > 120) {
                    alert('يرجى إدخال تاريخ ميلاد صحيح (عمر بين 10 و 120 سنة).');
                    return;
                }

                // Generate ID
                const idNum = generateId();
                const fullName = `${fName} ${lName}`;

                // Populate ID Card
                idAvatarDisplay.textContent = selectedAvatar;
                idFullName.textContent = fullName;
                idNumber.textContent = idNum;
                idGender.textContent = gen;
                idAge.textContent = `${age} سنة`;
                idCountry.textContent = cnt;
                idCity.textContent = cit;
                idLanguage.textContent = lang === 'ar' ? 'العربية' : lang === 'en' ? 'English' : 'Français';

                // Show card with animation
                idCard.classList.add('visible');
                idCard.style.display = 'block';

                // Disable create button
                createBtn.disabled = true;
                createBtn.innerHTML = '<i class="fas fa-check-circle"></i> تم الإنشاء';

                // Scroll to card
                idCard.scrollIntoView({ behavior: 'smooth', block: 'center' });

                console.log('✅ Character created:', { fullName, gender: gen, age, country: cnt, city: cit, language: lang,
                    avatar: selectedAvatar, id: idNum });
            });

            // ============================================================
            // Enter Game (simulate next phase)
            // ============================================================
            enterGameBtn.addEventListener('click', function() {
                alert('🎮 مرحباً بك في عالم Elysium!\n\n' +
                    'سيتم توجيهك إلى المرحلة الرابعة: اختيار سيناريو البداية.\n' +
                    '(فقير، متوسط الدخل، غني، طالب، موظف، طبيب، مهندس، صحفي، رجل أعمال، عسكري، سياسي، مجرم)');
                // In production: redirect to scenario selection page
            });

            // ============================================================
            // Back to auth
            // ============================================================
            backLink.addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('هل تريد العودة؟ لن تفقد بياناتك المدخلة.')) {
                    window.location.href = 'auth.html'; // Simulated
                    alert('🔐 سيتم توجيهك إلى صفحة تسجيل الدخول.');
                }
            });

            // ============================================================
            // Particles (light)
            // ============================================================
            const canvas = document.getElementById('char-particles');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                let w, h;
                const particles = [];
                const count = 35;

                function resize() {
                    w = canvas.width = window.innerWidth;
                    h = canvas.height = window.innerHeight;
                }

                function init() {
                    particles.length = 0;
                    for (let i = 0; i < count; i++) {
                        particles.push({
                            x: Math.random() * w,
                            y: Math.random() * h,
                            vx: (Math.random() - 0.5) * 0.2,
                            vy: (Math.random() - 0.5) * 0.2,
                            r: Math.random() * 1.5 + 0.5,
                            a: Math.random() * 0.25 + 0.05,
                        });
                    }
                }

                function draw() {
                    ctx.clearRect(0, 0, w, h);
                    for (const p of particles) {
                        p.x += p.vx;
                        p.y += p.vy;
                        if (p.x < 0) p.x = w;
                        if (p.x > w) p.x = 0;
                        if (p.y < 0) p.y = h;
                        if (p.y > h) p.y = 0;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(240,179,0,${p.a})`;
                        ctx.fill();
                    }
                    // connections
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 90) {
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                const alpha = 1 - dist / 90;
                                ctx.strokeStyle = `rgba(240,179,0,${alpha * 0.04})`;
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }
                    requestAnimationFrame(draw);
                }

                resize();
                init();
                draw();
                window.addEventListener('resize', () => { resize();
                    init(); });
            }

            console.log('🧑 Phase 3: Character Creation ready.');
            console.log('📌 Next: Phase 4 — Starting Scenario Selection.');
        })();
    </script>
</body>
</html>
