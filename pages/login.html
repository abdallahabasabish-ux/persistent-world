<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Elysium: Persistent World - نظام الحسابات" />
    <title>Elysium · حسابي</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
        /* ============================================================
           CSS CUSTOM — Authentication Design System
           ============================================================ */
        :root {
            --gold: #f0b300;
            --gold-light: #ffd866;
            --gold-dark: #b8860b;
            --bg-primary: #06060b;
            --bg-secondary: #0c0c18;
            --bg-card: rgba(18, 18, 42, 0.7);
            --text-primary: #f5f5fa;
            --text-secondary: #a8a8c8;
            --text-muted: #6b6b8a;
            --border-glow: rgba(240, 179, 0, 0.15);
            --shadow-glow: 0 0 60px rgba(240, 179, 0, 0.08);
            --radius: 24px;
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ---------- Animated Background ---------- */
        .auth-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 70% 50% at 10% 20%, rgba(240, 179, 0, 0.05), transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 80%, rgba(120, 80, 200, 0.04), transparent 50%),
                var(--bg-primary);
        }

        .auth-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.08;
            pointer-events: none;
            animation: float-orb 25s infinite alternate ease-in-out;
        }

        .auth-orb--1 {
            width: 600px;
            height: 600px;
            background: var(--gold);
            top: -20%;
            left: -10%;
            animation-delay: 0s;
        }

        .auth-orb--2 {
            width: 400px;
            height: 400px;
            background: #7c3aed;
            bottom: -15%;
            right: -5%;
            animation-delay: -8s;
        }

        @keyframes float-orb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(50px, -40px) scale(1.1);
            }
            100% {
                transform: translate(-30px, 30px) scale(0.9);
            }
        }

        /* ---------- Particles Canvas ---------- */
        #auth-particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* ---------- Main Card ---------- */
        .auth-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            margin: 24px;
            padding: 40px 36px;
            background: var(--bg-card);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), var(--shadow-glow);
            transition: var(--transition);
        }

        /* ---------- Logo ---------- */
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            margin-bottom: 8px;
        }

        .auth-logo i {
            background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-logo span {
            background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 28px;
            font-weight: 400;
        }

        /* ---------- Tabs ---------- */
        .auth-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 60px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .auth-tab {
            flex: 1;
            padding: 10px 16px;
            text-align: center;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 60px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Cairo', sans-serif;
        }

        .auth-tab.active {
            background: rgba(240, 179, 0, 0.12);
            color: var(--gold-light);
            box-shadow: 0 0 20px rgba(240, 179, 0, 0.05);
        }

        .auth-tab:hover:not(.active) {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.02);
        }

        /* ---------- Forms ---------- */
        .auth-form {
            display: none;
            flex-direction: column;
            gap: 18px;
            animation: fadeUp 0.4s ease forwards;
        }

        .auth-form.active {
            display: flex;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        .form-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            transition: var(--transition);
        }

        .form-group .input-wrapper:focus-within {
            border-color: rgba(240, 179, 0, 0.3);
            box-shadow: 0 0 0 4px rgba(240, 179, 0, 0.04);
            background: rgba(255, 255, 255, 0.05);
        }

        .form-group .input-wrapper .icon {
            padding: 0 14px 0 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .form-group .input-wrapper input,
        .form-group .input-wrapper select {
            width: 100%;
            padding: 14px 16px 14px 0;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            font-weight: 400;
        }

        .form-group .input-wrapper input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 0.9rem;
        }

        .form-group .input-wrapper select {
            appearance: none;
            cursor: pointer;
            padding-right: 8px;
            color: var(--text-primary);
        }

        .form-group .input-wrapper select option {
            background: #1a1a3a;
            color: #fff;
        }

        /* Password toggle */
        .toggle-password {
            padding: 0 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .toggle-password:hover {
            color: var(--text-primary);
        }

        /* ---------- Extras ---------- */
        .form-extras {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            margin: 4px 0 8px;
        }

        .form-extras a {
            color: var(--gold-light);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .form-extras a:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--gold);
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .checkbox-group a {
            color: var(--gold-light);
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        /* ---------- Buttons ---------- */
        .btn-auth {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0a0a0f;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 40px rgba(240, 179, 0, 0.15);
            font-family: 'Cairo', sans-serif;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-auth:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 60px rgba(240, 179, 0, 0.25);
        }

        .btn-auth:active {
            transform: scale(0.98);
        }

        .btn-auth--secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .btn-auth--secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        /* ---------- Terms & Privacy ---------- */
        .auth-footer {
            margin-top: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.7rem;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 20px;
        }

        .auth-footer a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .auth-footer a:hover {
            color: #fff;
        }

        /* ---------- Message / Alert ---------- */
        .auth-message {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 10px;
            animation: fadeUp 0.3s ease;
        }

        .auth-message.error {
            display: flex;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.12);
            color: #f87171;
        }

        .auth-message.success {
            display: flex;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.12);
            color: #4ade80;
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 480px) {
            .auth-card {
                padding: 28px 20px;
                margin: 16px;
            }

            .auth-logo {
                font-size: 1.4rem;
            }

            .auth-tab {
                font-size: 0.75rem;
                padding: 8px 12px;
            }

            .form-group .input-wrapper input {
                padding: 12px 12px 12px 0;
                font-size: 0.9rem;
            }

            .form-extras {
                flex-wrap: wrap;
                gap: 8px;
            }
        }

        /* ---------- Scrollbar hide for clean look ---------- */
        ::-webkit-scrollbar {
            width: 0;
        }

        /* Language selector inline */
        .lang-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .lang-selector select {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 4px 8px;
            color: var(--text-secondary);
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            outline: none;
        }

        .lang-selector select option {
            background: #1a1a3a;
            color: #fff;
        }

        /* Back to home link */
        .back-home {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 50;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .back-home:hover {
            color: #fff;
            border-color: rgba(240, 179, 0, 0.1);
            background: rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 640px) {
            .back-home {
                top: 16px;
                right: 16px;
                font-size: 0.7rem;
                padding: 6px 14px;
            }
            .back-home span {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    BACKGROUND
    ============================================================ -->
    <div class="auth-bg">
        <div class="auth-orb auth-orb--1"></div>
        <div class="auth-orb auth-orb--2"></div>
    </div>
    <canvas id="auth-particles"></canvas>

    <!-- ============================================================
    BACK TO HOME
    ============================================================ -->
    <a href="#" class="back-home" aria-label="العودة للرئيسية">
        <i class="fas fa-arrow-right"></i>
        <span>الرئيسية</span>
    </a>

    <!-- ============================================================
    AUTH CARD
    ============================================================ -->
    <main class="auth-card" role="main" aria-label="نظام الحسابات">

        <!-- Logo -->
        <a href="#" class="auth-logo">
            <i class="fas fa-crown"></i>
            <span>Elysium</span>
        </a>
        <p class="auth-subtitle">سجّل الدخول أو أنشئ حسابك لبدء رحلتك</p>

        <!-- Tabs -->
        <div class="auth-tabs" role="tablist">
            <button class="auth-tab active" data-tab="login" role="tab" aria-selected="true">تسجيل الدخول</button>
            <button class="auth-tab" data-tab="register" role="tab" aria-selected="false">إنشاء حساب</button>
        </div>

        <!-- ============================================================
        FORM: LOGIN
        ============================================================ -->
        <form class="auth-form active" id="formLogin" data-form="login" novalidate>
            <!-- Message placeholder -->
            <div class="auth-message" id="loginMessage"></div>

            <div class="form-group">
                <label for="loginEmail">البريد الإلكتروني أو اسم المستخدم</label>
                <div class="input-wrapper">
                    <span class="icon"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="loginEmail" placeholder="example@elysium.world" required />
                </div>
            </div>

            <div class="form-group">
                <label for="loginPassword">كلمة المرور</label>
                <div class="input-wrapper">
                    <span class="icon"><i class="fas fa-lock"></i></span>
                    <input type="password" id="loginPassword" placeholder="••••••••" required />
                    <button type="button" class="toggle-password" aria-label="إظهار كلمة المرور">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-extras">
                <a href="#" id="showForgot">نسيت كلمة المرور؟</a>
                <div class="lang-selector">
                    <i class="fas fa-globe"></i>
                    <select aria-label="اختيار اللغة">
                        <option value="ar" selected>العربية</option>
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-auth">
                <i class="fas fa-arrow-left"></i> دخول
            </button>

            <button type="button" class="btn-auth btn-auth--secondary" id="goToRegister">
                <i class="fas fa-user-plus"></i> ليس لديك حساب؟ سجّل الآن
            </button>
        </form>

        <!-- ============================================================
        FORM: REGISTER
        ============================================================ -->
        <form class="auth-form" id="formRegister" data-form="register" novalidate>
            <!-- Message placeholder -->
            <div class="auth-message" id="registerMessage"></div>

            <div class="form-group">
                <label for="regUsername">اسم المستخدم (الظاهر في اللعبة)</label>
                <div class="input-wrapper">
                    <span class="icon"><i class="fas fa-user"></i></span>
                    <input type="text" id="regUsername" placeholder="أحمد_الملك" required minlength="3" />
                </div>
            </div>

            <div class="form-group">
                <label for="regEmail">البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <span class="icon"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="regEmail" placeholder="example@elysium.world" required />
                </div>
            </div>

            <div class="form-group">
                <label for="regPassword">كلمة المرور</label>
                <div class="input-wrapper">
                    <span class="icon"><i class="fas fa-lock"></i></span>
                    <input type="password" id="regPassword" placeholder="••••••••" required minlength="8" />
                    <button type="button" class="toggle-password" aria-label="إظهار كلمة المرور">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="regPasswordConfirm">تأكيد كلمة المرور</label>
                <div class="input-wrapper">
                    <span class="icon"><i class="fas fa-check-circle"></i></span>
                    <input type="password" id="regPasswordConfirm" placeholder="••••••••" required />
                </div>
            </div>

            <div class="form-group">
                <label for="regLanguage">اللغة المفضلة</label>
                <div class="input-wrapper">
                    <span class="icon"><i class="fas fa-globe"></i></span>
                    <select id="regLanguage">
                        <option value="ar">العربية</option>
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                    </select>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="termsCheck" required />
                <label for="termsCheck">
                    أوافق على <a href="#" target="_blank">الشروط والأحكام</a> و <a href="#" target="_blank">سياسة الخصوصية</a>
                </label>
            </div>

            <button type="submit" class="btn-auth">
                <i class="fas fa-user-plus"></i> إنشاء الحساب
            </button>

            <button type="button" class="btn-auth btn-auth--secondary" id="goToLogin">
                <i class="fas fa-arrow-left"></i> لدي حساب بالفعل
            </button>
        </form>

        <!-- ============================================================
        FORM: FORGOT PASSWORD (hidden, shown via JS)
        ============================================================ -->
        <form class="auth-form" id="formForgot" data-form="forgot" novalidate>
            <div class="auth-message" id="forgotMessage"></div>
            <div style="text-align:center;margin-bottom:8px;">
                <i class="fas fa-key" style="font-size:2.4rem;color:var(--gold-light);opacity:0.4;"></i>
                <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:8px;">
                    أدخل بريدك الإلكتروني وسنرسل لك رابط استعادة كلمة المرور.
                </p>
            </div>

            <div class="form-group">
                <label for="forgotEmail">البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <span class="icon"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="forgotEmail" placeholder="example@elysium.world" required />
                </div>
            </div>

            <button type="submit" class="btn-auth">
                <i class="fas fa-paper-plane"></i> إرسال رابط الاستعادة
            </button>

            <button type="button" class="btn-auth btn-auth--secondary" id="backToLoginFromForgot">
                <i class="fas fa-arrow-left"></i> عد إلى تسجيل الدخول
            </button>
        </form>

        <!-- Footer -->
        <div class="auth-footer">
            &copy; 2026 Elysium Persistent World.
            <a href="#">الشروط</a> · <a href="#">الخصوصية</a> · <a href="#">الدعم</a>
        </div>
    </main>

    <!-- ============================================================
    JAVASCRIPT — Authentication Module
    ============================================================ -->
    <script>
        (function authModule() {
            'use strict';

            // ============================================================
            // DOM refs
            // ============================================================
            const tabs = document.querySelectorAll('[data-tab]');
            const forms = {
                login: document.getElementById('formLogin'),
                register: document.getElementById('formRegister'),
                forgot: document.getElementById('formForgot'),
            };

            const loginMsg = document.getElementById('loginMessage');
            const registerMsg = document.getElementById('registerMessage');
            const forgotMsg = document.getElementById('forgotMessage');

            const goToRegisterBtn = document.getElementById('goToRegister');
            const goToLoginBtn = document.getElementById('goToLogin');
            const showForgotLink = document.getElementById('showForgot');
            const backToLoginFromForgot = document.getElementById('backToLoginFromForgot');

            // All password toggles
            const toggleBtns = document.querySelectorAll('.toggle-password');

            // ============================================================
            // Tab switching
            // ============================================================
            function switchTab(tabId) {
                // Update tabs
                tabs.forEach(tab => {
                    const isActive = tab.dataset.tab === tabId;
                    tab.classList.toggle('active', isActive);
                    tab.setAttribute('aria-selected', isActive);
                });

                // Update forms
                Object.keys(forms).forEach(key => {
                    const form = forms[key];
                    if (!form) return;
                    const isTarget = key === tabId;
                    form.classList.toggle('active', isTarget);
                    // Clear messages when switching
                    const msg = form.querySelector('.auth-message');
                    if (msg) {
                        msg.className = 'auth-message';
                        msg.textContent = '';
                    }
                });

                // If switching to forgot, clear it
                if (tabId !== 'forgot') {
                    forms.forgot.classList.remove('active');
                }
            }

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabId = tab.dataset.tab;
                    if (tabId === 'forgot') {
                        // Forgot is triggered via link, not tab
                        return;
                    }
                    switchTab(tabId);
                });
            });

            // ============================================================
            // Navigation helpers
            // ============================================================
            function showLogin() {
                switchTab('login');
                // ensure forgot is hidden
                forms.forgot.classList.remove('active');
            }

            function showRegister() {
                switchTab('register');
                forms.forgot.classList.remove('active');
            }

            function showForgot() {
                // Hide all forms, show forgot
                Object.keys(forms).forEach(key => {
                    forms[key].classList.remove('active');
                });
                forms.forgot.classList.add('active');
                // Update tabs: remove active from all
                tabs.forEach(t => t.classList.remove('active'));
                // Clear messages
                forgotMsg.className = 'auth-message';
                forgotMsg.textContent = '';
            }

            goToRegisterBtn.addEventListener('click', showRegister);
            goToLoginBtn.addEventListener('click', showLogin);
            showForgotLink.addEventListener('click', (e) => {
                e.preventDefault();
                showForgot();
            });
            backToLoginFromForgot.addEventListener('click', showLogin);

            // ============================================================
            // Password toggle
            // ============================================================
            toggleBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const input = btn.closest('.input-wrapper').querySelector('input');
                    if (!input) return;
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    const icon = btn.querySelector('i');
                    if (icon) {
                        icon.classList.toggle('fa-eye');
                        icon.classList.toggle('fa-eye-slash');
                    }
                });
            });

            // ============================================================
            // Form submissions (Frontend validation only)
            // ============================================================
            function showMessage(msgEl, text, type = 'error') {
                msgEl.className = `auth-message ${type}`;
                msgEl.innerHTML = `<i class="fas ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'}"></i> ${text}`;
            }

            // Login
            forms.login.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value.trim();

                if (!email || !password) {
                    showMessage(loginMsg, 'يرجى ملء جميع الحقول.', 'error');
                    return;
                }
                // Simulate success
                showMessage(loginMsg, '✅ تم تسجيل الدخول بنجاح! جارٍ تحويلك إلى عالم Elysium...', 'success');
                // In production: redirect to game lobby or character creation
                setTimeout(() => {
                    alert('🚀 سيتم توجيهك إلى لوحة اللعبة (المرحلة القادمة).');
                }, 1200);
            });

            // Register
            forms.register.addEventListener('submit', (e) => {
                e.preventDefault();
                const username = document.getElementById('regUsername').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value.trim();
                const confirm = document.getElementById('regPasswordConfirm').value.trim();
                const terms = document.getElementById('termsCheck').checked;

                if (!username || !email || !password || !confirm) {
                    showMessage(registerMsg, 'يرجى ملء جميع الحقول.', 'error');
                    return;
                }
                if (username.length < 3) {
                    showMessage(registerMsg, 'اسم المستخدم يجب أن يكون 3 أحرف على الأقل.', 'error');
                    return;
                }
                if (password.length < 8) {
                    showMessage(registerMsg, 'كلمة المرور يجب أن تكون 8 أحرف على الأقل.', 'error');
                    return;
                }
                if (password !== confirm) {
                    showMessage(registerMsg, 'كلمة المرور وتأكيدها غير متطابقين.', 'error');
                    return;
                }
                if (!terms) {
                    showMessage(registerMsg, 'يجب الموافقة على الشروط والأحكام.', 'error');
                    return;
                }

                showMessage(registerMsg, '✅ تم إنشاء الحساب بنجاح! مرحباً بك في Elysium.', 'success');
                setTimeout(() => {
                    alert('🎉 سيتم توجيهك إلى إنشاء الشخصية (المرحلة الثالثة).');
                }, 1200);
            });

            // Forgot password
            forms.forgot.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('forgotEmail').value.trim();
                if (!email) {
                    showMessage(forgotMsg, 'يرجى إدخال بريدك الإلكتروني.', 'error');
                    return;
                }
                showMessage(forgotMsg, '📧 تم إرسال رابط الاستعادة إلى بريدك الإلكتروني.', 'success');
                setTimeout(() => {
                    showLogin();
                }, 2000);
            });

            // ============================================================
            // Particles Canvas (light version)
            // ============================================================
            const canvas = document.getElementById('auth-particles');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                let w, h;
                const particles = [];
                const count = 40;

                function resize() {
                    w = canvas.width = window.innerWidth;
                    h = canvas.height = window.innerHeight;
                }

                function initParticles() {
                    particles.length = 0;
                    for (let i = 0; i < count; i++) {
                        particles.push({
                            x: Math.random() * w,
                            y: Math.random() * h,
                            vx: (Math.random() - 0.5) * 0.3,
                            vy: (Math.random() - 0.5) * 0.3,
                            r: Math.random() * 1.5 + 0.5,
                            a: Math.random() * 0.3 + 0.05,
                        });
                    }
                }

                function draw() {
                    ctx.clearRect(0, 0, w, h);
                    for (const p of particles) {
                        p.x += p.vx;
                        p.y += p.vy;
                        if (p.x < 0) p.x = w;
                        if (p.x > w) p.x = 0;
                        if (p.y < 0) p.y = h;
                        if (p.y > h) p.y = 0;

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(240,179,0,${p.a})`;
                        ctx.fill();
                    }

                    // Connections
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 100) {
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                const alpha = 1 - dist / 100;
                                ctx.strokeStyle = `rgba(240,179,0,${alpha * 0.06})`;
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }

                    requestAnimationFrame(draw);
                }

                resize();
                initParticles();
                draw();

                window.addEventListener('resize', () => {
                    resize();
                    initParticles();
                });
            }

            // ============================================================
            // Keyboard shortcut: Escape to reset
            // ============================================================
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    // If in forgot, go to login
                    if (forms.forgot.classList.contains('active')) {
                        showLogin();
                    }
                }
            });

            console.log('🔐 Phase 2: Authentication System ready.');
            console.log('📌 Next: Phase 3 — Character Creation.');
        })();
    </script>
</body>
</html>
