<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elysium · تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
        body { background: #06060b; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Cairo', sans-serif; }
        .auth-card { background: rgba(18,18,42,0.7); backdrop-filter: blur(32px); border: 1px solid rgba(255,255,255,0.04); border-radius: 24px; padding: 40px 36px; max-width: 440px; width: 100%; box-shadow: 0 40px 80px rgba(0,0,0,0.6); }
        .auth-tab { padding: 10px; border-radius: 60px; background: transparent; color: #6b6b8a; font-weight: 700; transition: all 0.3s; cursor: pointer; border: none; }
        .auth-tab.active { background: rgba(240,179,0,0.12); color: #ffd866; }
        .input-wrapper { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 0 14px; display: flex; align-items: center; transition: 0.3s; }
        .input-wrapper:focus-within { border-color: rgba(240,179,0,0.3); box-shadow: 0 0 0 4px rgba(240,179,0,0.04); }
        .input-wrapper input { background: transparent; border: none; outline: none; color: #fff; padding: 14px 0; width: 100%; font-family: 'Cairo', sans-serif; }
        .btn-auth { background: linear-gradient(135deg, #f0b300, #b8860b); color: #0a0a0f; font-weight: 800; padding: 16px; border-radius: 60px; border: none; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(240,179,0,0.2); }
        .auth-message { padding: 12px; border-radius: 12px; display: none; font-weight: 600; }
        .auth-message.error { display: flex; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.12); color: #f87171; }
        .auth-message.success { display: flex; background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.12); color: #4ade80; }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="../index.html" class="flex items-center justify-center gap-2 text-2xl font-black text-white no-underline mb-2">
            <i class="fas fa-crown text-amber-400"></i><span class="bg-gradient-to-l from-amber-200 to-amber-600 bg-clip-text text-transparent">Elysium</span>
        </a>
        <p class="text-center text-gray-400 text-sm mb-6">سجّل الدخول أو أنشئ حسابك</p>

        <div class="flex gap-1 bg-white/5 p-1 rounded-full mb-6 border border-white/5">
            <button class="auth-tab active flex-1 text-center" data-tab="login">تسجيل الدخول</button>
            <button class="auth-tab flex-1 text-center" data-tab="register">إنشاء حساب</button>
        </div>

        <!-- Login Form -->
        <form id="formLogin" class="flex flex-col gap-4">
            <div id="loginMessage" class="auth-message"></div>
            <div class="input-wrapper"><i class="fas fa-envelope text-gray-500 ml-3"></i><input type="email" placeholder="البريد الإلكتروني" id="loginEmail" required /></div>
            <div class="input-wrapper"><i class="fas fa-lock text-gray-500 ml-3"></i><input type="password" placeholder="كلمة المرور" id="loginPassword" required /></div>
            <div class="flex justify-between text-sm"><a href="#" class="text-amber-400">نسيت كلمة المرور؟</a></div>
            <button type="submit" class="btn-auth"><i class="fas fa-arrow-left ml-2"></i> دخول</button>
        </form>

        <!-- Register Form -->
        <form id="formRegister" class="flex flex-col gap-4 hidden">
            <div id="registerMessage" class="auth-message"></div>
            <div class="input-wrapper"><i class="fas fa-user text-gray-500 ml-3"></i><input type="text" placeholder="اسم المستخدم" id="regUsername" required /></div>
            <div class="input-wrapper"><i class="fas fa-envelope text-gray-500 ml-3"></i><input type="email" placeholder="البريد الإلكتروني" id="regEmail" required /></div>
            <div class="input-wrapper"><i class="fas fa-lock text-gray-500 ml-3"></i><input type="password" placeholder="كلمة المرور" id="regPassword" required /></div>
            <div class="flex items-center gap-2 text-sm text-gray-400"><input type="checkbox" id="termsCheck" required /> <label for="termsCheck">أوافق على <a href="#" class="text-amber-400">الشروط</a></label></div>
            <button type="submit" class="btn-auth"><i class="fas fa-user-plus ml-2"></i> إنشاء الحساب</button>
        </form>

        <div class="text-center text-gray-500 text-xs mt-6 border-t border-white/5 pt-6">© 2026 Elysium</div>
    </div>

    <script>
        document.querySelectorAll('[data-tab]').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabId = this.dataset.tab;
                document.querySelectorAll('[data-tab]').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('formLogin').classList.toggle('hidden', tabId !== 'login');
                document.getElementById('formRegister').classList.toggle('hidden', tabId !== 'register');
                document.querySelectorAll('.auth-message').forEach(m => { m.className = 'auth-message';
                    m.textContent = ''; });
            });
        });

        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const msg = document.getElementById('loginMessage');
            msg.className = 'auth-message success';
            msg.textContent = '✅ تم تسجيل الدخول! جارٍ التحويل...';
            setTimeout(() => window.location.href = 'create-character.html', 1500);
        });

        document.getElementById('formRegister').addEventListener('submit', function(e) {
            e.preventDefault();
            const msg = document.getElementById('registerMessage');
            if (!document.getElementById('termsCheck').checked) {
                msg.className = 'auth-message error';
                msg.textContent = '❌ يجب الموافقة على الشروط.';
                return;
            }
            msg.className = 'auth-message success';
            msg.textContent = '✅ تم إنشاء الحساب! جارٍ التحويل...';
            setTimeout(() => window.location.href = 'create-character.html', 1500);
        });
    </script>
</body>
</html>
