<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elysium · مرحباً بك</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 (مكتبة الأيقونات) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- Firebase SDKs (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>

    <style>
        /* ============================================================
           أنماط خاصة بـ welcome مع Firebase
           ============================================================ */
        body {
            background: #06060b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Cairo', sans-serif;
            padding: 20px;
        }

        .welcome-card {
            background: rgba(18, 18, 42, 0.75);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 40px 36px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
        }

        .id-card-full {
            background: rgba(6, 6, 11, 0.8);
            border: 1px solid rgba(240, 179, 0, 0.06);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: 0.3s;
        }

        .stat-item:hover {
            border-color: rgba(240, 179, 0, 0.05);
            background: rgba(255, 255, 255, 0.03);
        }

        .stat-item .num {
            font-size: 1.6rem;
            font-weight: 900;
            color: #ffd866;
            transition: 0.3s;
        }

        .stat-item .label-icon {
            font-size: 1rem;
            margin-left: 4px;
        }

        .btn-start {
            background: linear-gradient(135deg, #f0b300, #b8860b);
            color: #0a0a0f;
            font-weight: 800;
            padding: 16px 48px;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(240, 179, 0, 0.2);
        }

        .btn-start:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Skeleton loading */
        .skeleton {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            animation: pulse 1.5s ease-in-out infinite;
            height: 24px;
            width: 80%;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.8;
            }
        }

        .skeleton-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* تحسين العرض في الجوال */
        @media (max-width: 640px) {
            .welcome-card {
                padding: 24px 16px;
            }
            .stat-item .num {
                font-size: 1.2rem;
            }
            .btn-start {
                padding: 14px 28px;
                font-size: 1rem;
                width: 100%;
                justify-content: center;
            }
        }

        /* أيقونات الحالة */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .status-badge.online {
            background: rgba(34, 197, 94, 0.08);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.05);
        }

        .status-badge.offline {
            background: rgba(239, 68, 68, 0.08);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.05);
        }
    </style>
</head>
<body>

    <div class="welcome-card" id="app">
        <!-- Logo -->
        <a href="../index.html" class="flex items-center justify-center gap-2 text-2xl font-black text-white no-underline mb-1">
            <i class="fas fa-crown text-amber-400"></i>
            <span class="bg-gradient-to-l from-amber-200 to-amber-600 bg-clip-text text-transparent">Elysium</span>
        </a>
        <p class="text-center text-gray-400 text-sm mb-6" id="welcomeSubtitle">
            <i class="fas fa-spinner fa-spin ml-1"></i> جاري تحميل بياناتك...
        </p>

        <!-- ============================================================
        بطاقة الهوية (سيتم تعبئتها بواسطة JavaScript)
        ============================================================ -->
        <div class="id-card-full" id="idCard">
            <!-- الرأس: الصورة + الاسم + رقم الهوية -->
            <div class="flex items-center gap-4 border-b border-white/5 pb-4" id="headerSection">
                <div class="w-20 h-20 rounded-full bg-amber-500/10 border border-amber-500/20 flex items-center justify-center text-4xl text-amber-400 overflow-hidden flex-shrink-0" id="avatarContainer">
                    <i class="fas fa-crown" id="avatarIcon"></i>
                    <img id="avatarImage" style="display:none; width:100%; height:100%; object-fit:cover;" />
                </div>
                <div class="flex-1 min-w-0">
                    <h2 class="font-black text-2xl truncate" id="displayName">...</h2>
                    <div class="flex flex-wrap items-center gap-2 mt-1">
                        <span class="text-gray-500 text-sm" id="displayId">#ELY-2026-XXXX</span>
                        <span class="status-badge online" id="statusBadge"><i class="fas fa-circle text-[8px]"></i> نشط</span>
                    </div>
                    <div class="bg-amber-500/10 text-amber-400 text-xs px-3 py-0.5 rounded-full inline-block mt-1" id="scenarioBadge">...</div>
                </div>
            </div>

            <!-- البيانات الأساسية -->
            <div class="grid grid-cols-3 gap-2 mt-4 text-sm" id="basicInfo">
                <div><span class="text-gray-500 text-xs"><i class="fas fa-venus-mars ml-1"></i>الجنس</span><div id="infoGender">...</div></div>
                <div><span class="text-gray-500 text-xs"><i class="fas fa-calendar-day ml-1"></i>العمر</span><div id="infoAge">...</div></div>
                <div><span class="text-gray-500 text-xs"><i class="fas fa-flag ml-1"></i>الدولة</span><div id="infoCountry">...</div></div>
            </div>

            <!-- إحصائيات البداية -->
            <div class="grid grid-cols-3 md:grid-cols-6 gap-3 mt-6" id="statsGrid">
                <!-- سيتم تعبئتها بواسطة JS -->
            </div>

            <!-- رسالة خطأ إن وجدت -->
            <div id="errorMessage" class="hidden mt-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm flex items-center gap-2">
                <i class="fas fa-circle-exclamation"></i>
                <span id="errorText"></span>
            </div>
        </div>

        <!-- أزرار الإجراءات -->
        <div class="flex flex-col md:flex-row gap-4 justify-center mt-8">
            <a href="game.html" class="btn-start" id="startBtn">
                <i class="fas fa-play"></i> ابدأ حياتك
            </a>
            <a href="choose-scenario.html" class="text-gray-400 hover:text-white text-sm flex items-center justify-center">
                <i class="fas fa-arrow-right ml-1"></i> عد للسيناريو
            </a>
            <button id="logoutBtn" class="text-gray-500 hover:text-red-400 text-sm flex items-center justify-center bg-transparent border-none cursor-pointer">
                <i class="fas fa-right-from-bracket ml-1"></i> خروج
            </button>
        </div>
    </div>

    <!-- ============================================================
    JAVASCRIPT — Firebase Integration
    ============================================================ -->
    <script>
        (function welcomeFirebase() {
            'use strict';

            // ============================================================
            // 1. تهيئة Firebase (من الإعدادات المقدمة)
            // ============================================================
            const firebaseConfig = {
                apiKey: "AIzaSyASbbpibXQb4S-C6os1CkSmWYlvhtx6KMQ",
                authDomain: "persistent-world.firebaseapp.com",
                projectId: "persistent-world",
                storageBucket: "persistent-world.firebasestorage.app",
                messagingSenderId: "933145890555",
                appId: "1:933145890555:web:598d13ef91464bb2416a5e",
                measurementId: "G-C226NX5E2T"
            };

            // التحقق من تحميل Firebase
            if (typeof firebase === 'undefined') {
                console.error('❌ Firebase SDK لم يتم تحميله.');
                document.getElementById('welcomeSubtitle').textContent = '⚠️ خطأ في تحميل Firebase';
                return;
            }

            const app = firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();

            // ============================================================
            // 2. دوال مساعدة للعرض
            // ============================================================
            const elements = {
                subtitle: document.getElementById('welcomeSubtitle'),
                avatarContainer: document.getElementById('avatarContainer'),
                avatarIcon: document.getElementById('avatarIcon'),
                avatarImage: document.getElementById('avatarImage'),
                displayName: document.getElementById('displayName'),
                displayId: document.getElementById('displayId'),
                statusBadge: document.getElementById('statusBadge'),
                scenarioBadge: document.getElementById('scenarioBadge'),
                infoGender: document.getElementById('infoGender'),
                infoAge: document.getElementById('infoAge'),
                infoCountry: document.getElementById('infoCountry'),
                statsGrid: document.getElementById('statsGrid'),
                errorMessage: document.getElementById('errorMessage'),
                errorText: document.getElementById('errorText'),
                startBtn: document.getElementById('startBtn'),
                logoutBtn: document.getElementById('logoutBtn'),
            };

            // تعريف أيقونات الإحصائيات
            const statIcons = {
                money: 'fa-coins',
                health: 'fa-heart',
                education: 'fa-graduation-cap',
                reputation: 'fa-star',
                popularity: 'fa-user-group',
                properties: 'fa-building'
            };

            const statLabels = {
                money: 'أموال',
                health: 'صحة',
                education: 'تعليم',
                reputation: 'سمعة',
                popularity: 'شعبية',
                properties: 'ممتلكات'
            };

            function renderStats(stats) {
                if (!stats) stats = {};
                const defaultStats = { money: 0, health: 0, education: 0, reputation: 0, popularity: 0, properties: 0 };
                const s = { ...defaultStats, ...stats };

                elements.statsGrid.innerHTML = Object.keys(statIcons).map(key => `
                    <div class="stat-item">
                        <div class="num">${s[key]?.toLocaleString?.() || s[key] || '٠'}</div>
                        <div class="text-gray-500 text-xs">
                            <i class="fas ${statIcons[key]} label-icon"></i>
                            ${statLabels[key]}
                        </div>
                    </div>
                `).join('');
            }

            function showError(msg) {
                elements.errorMessage.classList.remove('hidden');
                elements.errorText.textContent = msg;
            }

            function hideError() {
                elements.errorMessage.classList.add('hidden');
            }

            function setLoading(state) {
                if (state) {
                    elements.subtitle.innerHTML = '<i class="fas fa-spinner fa-spin ml-1"></i> جاري تحميل بياناتك...';
                    elements.startBtn.disabled = true;
                } else {
                    elements.subtitle.textContent = 'مرحباً بك في عالمك الجديد';
                    elements.startBtn.disabled = false;
                }
            }

            // ============================================================
            // 3. عرض البيانات (من Firebase أو sessionStorage)
            // ============================================================
            function displayCharacterData(data) {
                if (!data) {
                    showError('لا توجد بيانات شخصية. يرجى إنشاء شخصية أولاً.');
                    setLoading(false);
                    return;
                }

                hideError();

                // الصورة الرمزية
                if (data.avatarImage) {
                    elements.avatarIcon.style.display = 'none';
                    elements.avatarImage.style.display = 'block';
                    elements.avatarImage.src = data.avatarImage;
                } else {
                    elements.avatarIcon.style.display = 'block';
                    elements.avatarImage.style.display = 'none';
                    elements.avatarIcon.className = `fas ${data.icon || 'fa-crown'}`;
                }

                // الاسم ورقم الهوية
                elements.displayName.textContent = data.fullName || 'مواطن';
                elements.displayId.textContent = data.idNumber || '#ELY-2026-XXXX';

                // حالة الاتصال (نشط دائماً)
                elements.statusBadge.innerHTML = '<i class="fas fa-circle text-[8px]"></i> نشط';
                elements.statusBadge.className = 'status-badge online';

                // السيناريو
                elements.scenarioBadge.textContent = data.scenario || 'غير محدد';

                // البيانات الأساسية
                elements.infoGender.textContent = data.gender || 'غير محدد';
                elements.infoAge.textContent = data.age ? `${data.age} سنة` : 'غير محدد';
                elements.infoCountry.textContent = data.country || 'غير محدد';

                // الإحصائيات
                const stats = data.stats || {};
                renderStats(stats);

                // حفظ البيانات في sessionStorage للاستخدام في الصفحات التالية
                sessionStorage.setItem('elysium_character', JSON.stringify(data));

                setLoading(false);
            }

            // ============================================================
            // 4. جلب البيانات من Firestore
            // ============================================================
            async function fetchUserData(uid) {
                try {
                    const docRef = db.collection('users').doc(uid);
                    const doc = await docRef.get();
                    if (doc.exists) {
                        const data = doc.data();
                        // تحويل البيانات إلى الصيغة المطلوبة
                        const charData = {
                            fullName: data.displayName || data.fullName || 'مواطن',
                            avatarImage: data.photoURL || data.avatarImage || null,
                            icon: data.icon || 'fa-crown',
                            idNumber: data.idNumber || '#ELY-2026-' + Math.random().toString(36).substring(2, 6)
                                .toUpperCase(),
                            gender: data.gender || 'غير محدد',
                            age: data.age || 25,
                            country: data.country || 'غير محدد',
                            city: data.city || 'غير محدد',
                            scenario: data.scenario || 'متوسط',
                            guild: data.guild || 'عام',
                            stats: data.stats || {
                                money: 1000,
                                health: 80,
                                education: 40,
                                reputation: 50,
                                popularity: 30,
                                properties: 0
                            }
                        };
                        return charData;
                    } else {
                        console.warn('⚠️ لا توجد وثيقة للمستخدم في Firestore، استخدام sessionStorage.');
                        return null;
                    }
                } catch (error) {
                    console.warn('⚠️ خطأ في قراءة Firestore:', error);
                    return null;
                }
            }

            // ============================================================
            // 5. الوظيفة الرئيسية لتحميل البيانات
            // ============================================================
            async function loadData() {
                setLoading(true);

                // أولاً: محاولة جلب من sessionStorage (سريع)
                let localData = null;
                try {
                    const stored = sessionStorage.getItem('elysium_character');
                    if (stored) localData = JSON.parse(stored);
                } catch (e) {}

                // ثانياً: التحقق من وجود مستخدم مسجل في Firebase
                const user = auth.currentUser;
                let firestoreData = null;

                if (user) {
                    console.log('👤 مستخدم Firebase:', user.uid);
                    firestoreData = await fetchUserData(user.uid);
                } else {
                    console.log('👤 لا يوجد مستخدم مسجل، ننتظر تغيير الحالة...');
                    // إذا لم يكن هناك مستخدم، ننتظر تغيير الحالة (ربما المستخدم يسجل الآن)
                    // لكننا نعرض البيانات المحلية مؤقتاً
                }

                // دمج البيانات: الأولوية لـ Firestore إذا وجدت
                let finalData = firestoreData || localData;

                // إذا لم توجد أي بيانات، نستخدم بيانات افتراضية (للتجربة)
                if (!finalData) {
                    // محاولة إنشاء بيانات وهمية من sessionStorage إن وجدت بشكل جزئي
                    if (localData) {
                        finalData = localData;
                    } else {
                        // بيانات افتراضية للعرض
                        finalData = {
                            fullName: 'أحمد الملك',
                            icon: 'fa-crown',
                            idNumber: '#ELY-2026-A7K3',
                            gender: 'ذكر',
                            age: 25,
                            country: 'مصر',
                            city: 'القاهرة',
                            scenario: 'فقير',
                            guild: 'الدولة',
                            stats: { money: 1000, health: 80, education: 40, reputation: 50, popularity: 30,
                                properties: 0 }
                        };
                        console.warn('⚠️ استخدام بيانات افتراضية (لا توجد بيانات مخزنة)');
                    }
                }

                displayCharacterData(finalData);

                // إذا لم يكن هناك مستخدم Firebase، نعرض رسالة
                if (!user) {
                    elements.statusBadge.innerHTML = '<i class="fas fa-circle text-[8px]"></i> غير متصل';
                    elements.statusBadge.className = 'status-badge offline';
                    // نضيف زر تسجيل دخول سريع
                    const logoutBtn = elements.logoutBtn;
                    logoutBtn.innerHTML = '<i class="fas fa-arrow-right ml-1"></i> تسجيل الدخول';
                    logoutBtn.onclick = function() {
                        window.location.href = 'login.html';
                    };
                } else {
                    // زر الخروج يعمل
                    elements.logoutBtn.onclick = function() {
                        auth.signOut().then(() => {
                            window.location.href = '../index.html';
                        }).catch((err) => {
                            console.error(err);
                            alert('حدث خطأ أثناء الخروج');
                        });
                    };
                }
            }

            // ============================================================
            // 6. مراقبة حالة المصادقة (Auth State Observer)
            // ============================================================
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    console.log('✅ المستخدم مسجل:', user.uid);
                    // إعادة تحميل البيانات مع Firestore
                    await loadData();
                } else {
                    console.log('👤 لا يوجد مستخدم مسجل.');
                    // نعرض البيانات من sessionStorage إن وجدت
                    const stored = sessionStorage.getItem('elysium_character');
                    if (stored) {
                        try {
                            const data = JSON.parse(stored);
                            displayCharacterData(data);
                            // تغيير حالة البطاقة إلى "غير متصل"
                            elements.statusBadge.innerHTML = '<i class="fas fa-circle text-[8px]"></i> غير متصل';
                            elements.statusBadge.className = 'status-badge offline';
                            // تعديل زر الخروج ليصبح تسجيل دخول
                            elements.logoutBtn.innerHTML = '<i class="fas fa-arrow-right ml-1"></i> تسجيل الدخول';
                            elements.logoutBtn.onclick = function() {
                                window.location.href = 'login.html';
                            };
                            setLoading(false);
                        } catch (e) {
                            loadData(); // fallback
                        }
                    } else {
                        // لا توجد بيانات، نذهب لتسجيل الدخول
                        window.location.href = 'login.html';
                    }
                }
            });

            // ============================================================
            // 7. بدء اللعبة (زر "ابدأ حياتك")
            // ============================================================
            elements.startBtn.addEventListener('click', function(e) {
                e.preventDefault();
                // التأكد من وجود بيانات قبل الانتقال
                const data = sessionStorage.getItem('elysium_character');
                if (!data) {
                    alert('⚠️ لم يتم العثور على بيانات شخصيتك. يرجى إنشاء شخصية أولاً.');
                    window.location.href = 'create-character.html';
                    return;
                }
                window.location.href = 'game.html';
            });

            // ============================================================
            // 8. تنفيذ التحميل الأولي
            // ============================================================
            // نبدأ بتحميل البيانات (سيتم استدعاؤها أيضاً عند تغير حالة المصادقة)
            loadData();

            console.log('🔥 Welcome page with Firebase integration ready.');
        })();
    </script>
</body>
</html>
